title: "DailyPulse · 每日脉搏"
description: "AI 驱动的中英双语每日技术简报 — 聚合 GitHub Trending、Hacker News、arXiv、Product Hunt 与财经要闻"
lang: zh-CN

# 使用 Minima 主题（GitHub Pages 内置）
theme: minima

minima:
  skin: classic
  date_format: "%Y-%m-%d"
  social_links:
    - {
        platform: github,
        user_url: "https://github.com/OuterCloud/daily-pulse",
      }

github_repo: "https://github.com/OuterCloud/daily-pulse"

# 文章永久链接格式
permalink: /:year/:month/:day/:title/

# 显示文章摘要
show_excerpts: true
excerpt_separator: "<!--more-->"

# 时区
timezone: Asia/Shanghai

# 构建设置
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
